name: NSE Market Simulator

on:
  # Runs every weekday at 9:15 AM IST (= 03:45 UTC, IST is UTC+5:30)
  schedule:
    - cron: '45 3 * * 1-5'

  # Also allows a manual "Run workflow" button in the GitHub Actions UI
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    # Safety ceiling: 6 h 20 min covers full NSE session (9:15 AM – 3:15 PM IST)
    # plus a small buffer. GitHub cancels the job if it runs longer.
    timeout-minutes: 380

    steps:
      # ── 1. Pull the latest simulator.py ───────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python runtime ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies (no venv needed on CI) ────────────
      - name: Install dependencies
        run: pip install yfinance pandas requests pytz

      # ── 4. Run the simulator ──────────────────────────────────────
      # Script exits on its own at 3:15 PM IST (win/loss/EOD).
      # PYTHONUTF8 ensures the ₹ symbol renders correctly in logs.
      - name: Run simulator
        env:
          PYTHONUTF8: "1"
        run: python simulator.py

      # ── 5. Rename log to include today's date ─────────────────────
      - name: Rename trade log with date
        if: always()   # run even if the simulator exits with code 1 (loss)
        run: |
          TODAY=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
          echo "TODAY=$TODAY" >> $GITHUB_ENV
          if [ -f trade_log.csv ]; then
            cp trade_log.csv "trade_log_${TODAY}.csv"
            echo "Log saved as trade_log_${TODAY}.csv"
          else
            echo "No trade_log.csv found (no trades executed today)."
          fi

      # ── 6. Upload dated log as a downloadable artifact ────────────
      - name: Upload trade log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Artifact name includes the date for easy browsing
          name: trade-log-${{ env.TODAY }}
          path: trade_log_*.csv
          # Keep logs for 90 days
          retention-days: 90
          # Don't fail the workflow if no CSV was produced
          if-no-files-found: warn
