name: NSE Market Simulator

on:
  # Fires Sun–Thu at 22:30 UTC (= Mon–Fri 04:00 IST).
  # Accounts for ~5 h GitHub Actions queue delay so the run
  # actually starts around 09:00–09:30 IST on each trading day.
  schedule:
    - cron: '30 22 * * 0-4'

  # Manual "Run workflow" button in the GitHub Actions UI
  workflow_dispatch:

# Allow the workflow to push the trade log back to the repo
permissions:
  contents: write

# Only one simulator run at a time — if a new run starts while one is already
# running (e.g. delayed cron fires after a manual run), cancel the new one.
concurrency:
  group: nse-simulator
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  simulate:
    runs-on: ubuntu-latest

    # Safety ceiling: 6 h 20 min covers the full NSE session + buffer
    timeout-minutes: 400

    steps:
      # ── 1. Pull the latest code ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python runtime ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run the simulator ──────────────────────────────────────
      # Script exits on its own at 3:15 PM IST (win / loss / EOD).
      # PYTHONUTF8 keeps the ₹ symbol intact in logs.
      - name: Run simulator
        env:
          PYTHONUTF8: "1"
        run: python simulator.py

      # ── 5. Save dated log to logs/ and commit back to the repo ────
      # This makes logs publicly readable via raw.githubusercontent.com,
      # so the dashboard at crshivnarayan.com can fetch them without auth.
      - name: Commit trade log to repo
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(TZ='Asia/Kolkata' date +%Y-%m-%d)
          echo "TODAY=$TODAY" >> $GITHUB_ENV

          if [ ! -f trade_log.csv ]; then
            echo "No trade_log.csv — no trades executed today. Skipping commit."
            exit 0
          fi

          mkdir -p logs
          cp trade_log.csv "logs/trade_log_${TODAY}.csv"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "logs/trade_log_${TODAY}.csv"

          if git diff --cached --quiet; then
            echo "Log unchanged — nothing to commit."
          else
            git commit -m "logs: add trade log for ${TODAY}"
            git pull --rebase origin main
            git push
            echo "Committed and pushed logs/trade_log_${TODAY}.csv"
          fi

      # ── 6. Also upload as a GitHub Actions artifact (90-day backup) ─
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-log-${{ env.TODAY }}
          path: logs/trade_log_*.csv
          retention-days: 90
          if-no-files-found: warn
